<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TAPACD - AI Phone Detection</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: #0b0f1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            color: #00f2ff;
        }

        .video-box {
            border: 3px solid #00f2ff;
            border-radius: 10px;
            padding: 10px;
            width: 760px;
            margin: 20px auto;
            box-shadow: 0 0 15px #00f2ff;
        }

        .gallery {
            width: 90%;
            margin: 40px auto;
            padding: 20px;
            border: 3px solid #00f2ff;
            border-radius: 10px;
            box-shadow: 0 0 15px #00f2ff;
        }

        .gallery h2 {
            margin-bottom: 20px;
            color: #00f2ff;
        }

        .images {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .images img {
            width: 220px;
            height: auto;
            border-radius: 8px;
            border: 2px solid #00f2ff;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .images img:hover {
            transform: scale(1.05);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            margin-top: 5%;
            max-width: 90%;
            max-height: 90%;
            border: 3px solid #00f2ff;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 40px;
            color: #ffffff;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>📷 AI Phone Detection</h1>

<div class="video-box">
    <h2>Live Camera Feed</h2>
    <img src="{{ url_for('video') }}" width="720">
</div>

<div class="gallery">
    <h2>Captured Screenshots</h2>

    <div class="images">
        {% for img in images %}
            <img src="{{ url_for('get_capture', filename=img) }}"
                 onclick="openModal(this.src)">
        {% endfor %}
    </div>
</div>

<!-- MODAL -->
<div id="imgModal" class="modal" onclick="closeModal()">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImg">
</div>

<script>
    function openModal(src) {
        document.getElementById("imgModal").style.display = "block";
        document.getElementById("modalImg").src = src;
    }

    function closeModal() {
        document.getElementById("imgModal").style.display = "none";
    }
</script>

</body>
</html>
